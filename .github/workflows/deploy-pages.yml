name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      # Fixed URL rather than a step output: it's the same regardless of which
      # deploy attempt below actually succeeds.
      url: https://eriic-builds.github.io/wc26-bracket/
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      # GitHub's Pages deployment backend intermittently answers a freshly
      # created deployment with "Deployment failed, try again later." even
      # when nothing is wrong with the artifact or config (seen on runs #3
      # and #6). actions/deploy-pages treats that as terminal and doesn't
      # retry itself, so we retry the deploy step here, reusing the artifact
      # already uploaded above -- up to 3 attempts with a short backoff.
      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy1
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait before retry 1
        if: steps.deploy1.outcome == 'failure'
        run: sleep 20

      - name: Deploy to GitHub Pages (attempt 2)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait before retry 2
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 45

      - name: Deploy to GitHub Pages (attempt 3)
        id: deploy3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v5
