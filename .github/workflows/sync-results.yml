name: Sync World Cup results

# Pulls finished-game results from the web and refreshes the dashboard.
# Scheduled to run right after each daily block of matches finishes (games kick
# off ~12pm-11pm ET and last ~2h), so results land within ~30-60 min of the final
# whistle -- no idle hourly runs. Can also be triggered by hand from the Actions tab.

on:
  schedule:
    # Times are UTC. Summer ET = UTC-4. Three runs cover the day's match blocks:
    - cron: "0 22 * * *"   # 6:00 PM ET  - after the afternoon games (noon-3pm ET kickoffs)
    - cron: "30 1 * * *"   # 9:30 PM ET  - after the early-evening games (5-6:30pm ET kickoffs)
    - cron: "0 6 * * *"    # 2:00 AM ET  - after the late-night games (8-11pm ET kickoffs)
  workflow_dispatch: {}      # manual "Run workflow" button

# Let the job commit the refreshed dashboard back to the repo and kick off the
# Pages deploy afterwards.
permissions:
  contents: write
  actions: write

concurrency:
  group: sync-results
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch results and rebuild the dashboard
        # Uses FIFA's free public results feed (api.fifa.com) — no API key or
        # secret required. Pass --source footballdata (and set FOOTBALL_DATA_TOKEN)
        # only if you prefer that source instead.
        run: python scripts/fetch_results.py

      - name: Rebuild HTML so docs/index.html always matches the source
        # Safety net: the REFRESHED stamp and all data live in build_dashboard.py,
        # so the generated HTML must be rebuilt from it. Running the generator
        # unconditionally guarantees the two never drift, even if fetch logic
        # changes. It is idempotent — no diff when already current.
        run: python scripts/build_dashboard.py

      - name: Commit and push if the dashboard changed
        id: commit
        run: |
          if [[ -n "$(git status --porcelain docs/index.html scripts/build_dashboard.py)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/index.html scripts/build_dashboard.py
            git commit -m "chore: auto-sync World Cup results"
            git push
            echo "Pushed updated results."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes — dashboard already current."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Pages deploy
        # Pushes made with the built-in GITHUB_TOKEN never fire other workflows'
        # push triggers (GitHub's anti-recursion safeguard), so the commit above
        # would never kick off deploy-pages.yml on its own. Dispatch it explicitly
        # instead -- an explicit workflow_dispatch call IS allowed to trigger a run.
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-pages.yml --ref "${{ github.ref_name }}"
