name: Sync World Cup results

# Pulls finished-game results from the web and refreshes the dashboard.
# Runs on a schedule (about hourly, so updates land within an hour of a game
# finishing) and can also be triggered by hand from the Actions tab.

on:
  schedule:
    - cron: "15 * * * *"   # every hour at :15 (UTC)
  workflow_dispatch: {}      # manual "Run workflow" button

# Let the job commit the refreshed dashboard back to the repo.
permissions:
  contents: write

concurrency:
  group: sync-results
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch results and rebuild the dashboard
        env:
          # Add a free token at Settings > Secrets and variables > Actions.
          # Without it, this step is a clean no-op.
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: python scripts/fetch_results.py

      - name: Commit and push if the dashboard changed
        run: |
          if [[ -n "$(git status --porcelain docs/index.html scripts/build_dashboard.py)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/index.html scripts/build_dashboard.py
            git commit -m "chore: auto-sync World Cup results [skip ci]"
            git push
            echo "Pushed updated results."
          else
            echo "No changes — dashboard already current."
          fi
